# ─── Root Query Type ────────────────────────────────────────────────────────

type Query {
  # DataStore Management
  getDataStore(datastoreId: String!): DataStore
  listDataStores(filter: DatastoreFilterInput, maxResults: Int, nextToken: String): DataStoreConnection!
  describeDataStore(datastoreId: String!): DataStoreProperties

  # Import Jobs
  describeFHIRImportJob(datastoreId: String!, jobId: String!): ImportJobProperties
  listFHIRImportJobs(datastoreId: String!, jobName: String, jobStatus: JobStatus, submittedBefore: DateTime, submittedAfter: DateTime, maxResults: Int, nextToken: String): ImportJobConnection!

  # Export Jobs
  describeFHIRExportJob(datastoreId: String!, jobId: String!): ExportJobProperties
  listFHIRExportJobs(datastoreId: String!, jobName: String, jobStatus: JobStatus, submittedBefore: DateTime, submittedAfter: DateTime, maxResults: Int, nextToken: String): ExportJobConnection!

  # Tagging
  listTagsForResource(resourceARN: String!): TagResource

  # FHIR Resources
  getPatient(datastoreId: String!, id: String!): Patient
  listPatients(datastoreId: String!, filter: FHIRSearchParams, count: Int, pageToken: String): PatientConnection!
  getPractitioner(datastoreId: String!, id: String!): Practitioner
  getPractitionerRole(datastoreId: String!, id: String!): PractitionerRole
  getOrganization(datastoreId: String!, id: String!): Organization
  getLocation(datastoreId: String!, id: String!): Location
  getHealthcareService(datastoreId: String!, id: String!): HealthcareService
  getRelatedPerson(datastoreId: String!, id: String!): RelatedPerson
  getEncounter(datastoreId: String!, id: String!): Encounter
  listEncounters(datastoreId: String!, filter: FHIRSearchParams, count: Int, pageToken: String): EncounterConnection!
  getCondition(datastoreId: String!, id: String!): Condition
  listConditions(datastoreId: String!, filter: FHIRSearchParams, count: Int, pageToken: String): ConditionConnection!
  getObservation(datastoreId: String!, id: String!): Observation
  listObservations(datastoreId: String!, filter: FHIRSearchParams, count: Int, pageToken: String): ObservationConnection!
  getMedicationRequest(datastoreId: String!, id: String!): MedicationRequest
  getMedicationAdministration(datastoreId: String!, id: String!): MedicationAdministration
  getDiagnosticReport(datastoreId: String!, id: String!): DiagnosticReport
  getProcedure(datastoreId: String!, id: String!): Procedure
  getImmunization(datastoreId: String!, id: String!): Immunization
  getAllergyIntolerance(datastoreId: String!, id: String!): AllergyIntolerance
  getCarePlan(datastoreId: String!, id: String!): CarePlan
  getCareTeam(datastoreId: String!, id: String!): CareTeam
  getCoverage(datastoreId: String!, id: String!): Coverage
  getClaim(datastoreId: String!, id: String!): Claim
  getExplanationOfBenefit(datastoreId: String!, id: String!): ExplanationOfBenefit
  getDocumentReference(datastoreId: String!, id: String!): DocumentReference
  getServiceRequest(datastoreId: String!, id: String!): ServiceRequest
  getCommunication(datastoreId: String!, id: String!): Communication
  getMeasure(datastoreId: String!, id: String!): Measure
  getMeasureReport(datastoreId: String!, id: String!): MeasureReport
  getQuestionnaire(datastoreId: String!, id: String!): Questionnaire
  getQuestionnaireResponse(datastoreId: String!, id: String!): QuestionnaireResponse
  getDevice(datastoreId: String!, id: String!): Device
  getSubstance(datastoreId: String!, id: String!): Substance
  getNutritionOrder(datastoreId: String!, id: String!): NutritionOrder
  getTask(datastoreId: String!, id: String!): Task
  getConsent(datastoreId: String!, id: String!): Consent
  getProvenance(datastoreId: String!, id: String!): Provenance
  getAuditEvent(datastoreId: String!, id: String!): AuditEvent
  getBundle(datastoreId: String!, id: String!): Bundle
  getCapabilityStatement(datastoreId: String!): CapabilityStatement
}

# ─── Mutations ───────────────────────────────────────────────────────────────

type Mutation {
  # DataStore Management
  createDataStore(input: CreateDataStoreInput!): DataStore!
  deleteDataStore(datastoreId: String!): DataStoreStatus!

  # Import / Export
  startFHIRImportJob(input: StartFHIRImportJobInput!): ImportJobProperties!
  startFHIRExportJob(input: StartFHIRExportJobInput!): ExportJobProperties!
  cancelFHIRExportJob(datastoreId: String!, jobId: String!): ExportJobProperties!

  # Tagging
  tagResource(resourceARN: String!, tags: [TagInput!]!): Boolean!
  untagResource(resourceARN: String!, tagKeys: [String!]!): Boolean!

  # FHIR Create / Update / Delete
  createPatient(datastoreId: String!, resource: String!): Patient!
  updatePatient(datastoreId: String!, id: String!, resource: String!): Patient!
  deletePatient(datastoreId: String!, id: String!): OperationOutcome!
  createEncounter(datastoreId: String!, resource: String!): Encounter!
  updateEncounter(datastoreId: String!, id: String!, resource: String!): Encounter!
  createCondition(datastoreId: String!, resource: String!): Condition!
  updateCondition(datastoreId: String!, id: String!, resource: String!): Condition!
  createObservation(datastoreId: String!, resource: String!): Observation!
  updateObservation(datastoreId: String!, id: String!, resource: String!): Observation!
  createMedicationRequest(datastoreId: String!, resource: String!): MedicationRequest!
  createDiagnosticReport(datastoreId: String!, resource: String!): DiagnosticReport!
  createProcedure(datastoreId: String!, resource: String!): Procedure!
  createImmunization(datastoreId: String!, resource: String!): Immunization!
  createTask(datastoreId: String!, resource: String!): Task!
  updateTask(datastoreId: String!, id: String!, resource: String!): Task!
  createConsent(datastoreId: String!, resource: String!): Consent!
  createBundle(datastoreId: String!, bundle: String!): Bundle!
}

