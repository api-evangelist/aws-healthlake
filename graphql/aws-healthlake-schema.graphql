"""
AWS HealthLake GraphQL Schema
Conceptual schema covering FHIR R4 resources and HealthLake-specific management types.
AWS HealthLake is a HIPAA-eligible, FHIR R4-compliant managed service for importing,
transforming, storing, and querying health data.
"""

# ─── Scalars ────────────────────────────────────────────────────────────────

scalar DateTime
scalar Date
scalar URI
scalar Decimal
scalar XHTML

# ─── Enums ──────────────────────────────────────────────────────────────────

enum FHIRVersion {
  R4
}

enum DataStoreStatus {
  CREATING
  ACTIVE
  DELETING
  DELETED
  CREATE_FAILED
  DELETE_FAILED
}

enum JobStatus {
  SUBMITTED
  IN_PROGRESS
  COMPLETED_WITH_ERRORS
  COMPLETED
  FAILED
  CANCEL_SUBMITTED
  CANCEL_IN_PROGRESS
  CANCEL_COMPLETED
  CANCEL_FAILED
}

enum PreloadDataType {
  SYNTHEA
}

enum EncryptionType {
  AWS_OWNED_KMS_KEY
  CUSTOMER_MANAGED_KMS_KEY
}

enum BundleType {
  DOCUMENT
  MESSAGE
  TRANSACTION
  TRANSACTION_RESPONSE
  BATCH
  BATCH_RESPONSE
  HISTORY
  SEARCHSET
  COLLECTION
}

enum ResourceType {
  Patient
  Practitioner
  Organization
  Encounter
  Condition
  Observation
  MedicationRequest
  DiagnosticReport
  Procedure
  Immunization
  AllergyIntolerance
  CarePlan
  CareTeam
  Coverage
  Claim
  ExplanationOfBenefit
  DocumentReference
  ServiceRequest
  Communication
  MeasureReport
  Measure
  Questionnaire
  QuestionnaireResponse
  Device
  Location
  HealthcareService
  PractitionerRole
  RelatedPerson
  Substance
  MedicationAdministration
  NutritionOrder
  Task
  Consent
  Provenance
  AuditEvent
  Bundle
  CapabilityStatement
  OperationOutcome
}

enum AdministrativeGender {
  MALE
  FEMALE
  OTHER
  UNKNOWN
}

enum ObservationStatus {
  REGISTERED
  PRELIMINARY
  FINAL
  AMENDED
  CORRECTED
  CANCELLED
  ENTERED_IN_ERROR
  UNKNOWN
}

enum EncounterStatus {
  PLANNED
  ARRIVED
  TRIAGED
  IN_PROGRESS
  ON_LEAVE
  FINISHED
  CANCELLED
  ENTERED_IN_ERROR
  UNKNOWN
}

enum ConditionClinicalStatus {
  ACTIVE
  RECURRENCE
  RELAPSE
  INACTIVE
  REMISSION
  RESOLVED
}

enum TaskStatus {
  DRAFT
  REQUESTED
  RECEIVED
  ACCEPTED
  REJECTED
  READY
  CANCELLED
  IN_PROGRESS
  ON_HOLD
  FAILED
  COMPLETED
  ENTERED_IN_ERROR
}

enum ConsentStatus {
  DRAFT
  PROPOSED
  ACTIVE
  REJECTED
  INACTIVE
  ENTERED_IN_ERROR
}

enum TaskPriority {
  ROUTINE
  URGENT
  ASAP
  STAT
}

# ─── Common FHIR Structures ──────────────────────────────────────────────────

type Coding {
  system: URI
  version: String
  code: String
  display: String
  userSelected: Boolean
}

type CodeableConcept {
  coding: [Coding!]
  text: String
}

type Identifier {
  use: String
  type: CodeableConcept
  system: URI
  value: String
  period: Period
  assigner: Reference
}

type Reference {
  reference: String
  type: URI
  identifier: Identifier
  display: String
}

type Period {
  start: DateTime
  end: DateTime
}

type Quantity {
  value: Decimal
  comparator: String
  unit: String
  system: URI
  code: String
}

type Range {
  low: Quantity
  high: Quantity
}

type Ratio {
  numerator: Quantity
  denominator: Quantity
}

type HumanName {
  use: String
  text: String
  family: String
  given: [String!]
  prefix: [String!]
  suffix: [String!]
  period: Period
}

type Address {
  use: String
  type: String
  text: String
  line: [String!]
  city: String
  district: String
  state: String
  postalCode: String
  country: String
  period: Period
}

type ContactPoint {
  system: String
  value: String
  use: String
  rank: Int
  period: Period
}

type Annotation {
  authorReference: Reference
  authorString: String
  time: DateTime
  text: String
}

type Attachment {
  contentType: String
  language: String
  data: String
  url: URI
  size: Int
  hash: String
  title: String
  creation: DateTime
}

type Timing {
  event: [DateTime!]
  repeat: TimingRepeat
  code: CodeableConcept
}

type TimingRepeat {
  boundsDuration: Quantity
  boundsRange: Range
  boundsPeriod: Period
  count: Int
  countMax: Int
  duration: Decimal
  durationMax: Decimal
  durationUnit: String
  frequency: Int
  frequencyMax: Int
  period: Decimal
  periodMax: Decimal
  periodUnit: String
  dayOfWeek: [String!]
  timeOfDay: [String!]
  when: [String!]
  offset: Int
}

type Dosage {
  sequence: Int
  text: String
  additionalInstruction: [CodeableConcept!]
  patientInstruction: String
  timing: Timing
  asNeededBoolean: Boolean
  asNeededCodeableConcept: CodeableConcept
  site: CodeableConcept
  route: CodeableConcept
  method: CodeableConcept
  doseAndRate: [DosageAndRate!]
  maxDosePerPeriod: Ratio
  maxDosePerAdministration: Quantity
  maxDosePerLifetime: Quantity
}

type DosageAndRate {
  type: CodeableConcept
  doseRange: Range
  doseQuantity: Quantity
  rateRatio: Ratio
  rateRange: Range
  rateQuantity: Quantity
}

type Narrative {
  status: String
  div: XHTML
}

type Meta {
  versionId: String
  lastUpdated: DateTime
  source: URI
  profile: [URI!]
  security: [Coding!]
  tag: [Coding!]
}

# ─── HealthLake Management Types ────────────────────────────────────────────

type Tag {
  key: String!
