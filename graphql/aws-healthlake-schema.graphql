}

type ImportJobProperties {
  jobId: String!
  jobName: String
  jobStatus: JobStatus!
  submitTime: DateTime!
  endTime: DateTime
  datastoreId: String!
  inputDataConfig: S3Configuration!
  jobOutputDataConfig: S3Configuration
  dataAccessRoleArn: String!
  message: String
}

type ExportJobProperties {
  jobId: String!
  jobName: String
  jobStatus: JobStatus!
  submitTime: DateTime!
  endTime: DateTime
  datastoreId: String!
  outputDataConfig: S3Configuration!
  dataAccessRoleArn: String!
  message: String
}

